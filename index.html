<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마산무학여고 테트리스</title>
    <style>
        body {
            background-color: #ffeff5; 
            color: #333;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow: hidden; /* 스크롤 방지 */
        }

        /* 상단 타이틀 */
        #game-title {
            font-size: 20px;
            font-weight: 800;
            color: #ff1493;
            margin: 10px 0;
            background: white;
            padding: 8px 20px;
            border-radius: 50px;
            border: 3px solid #ffb6c1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        #game-wrapper {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #header {
            width: 100%;
            display: flex;
            justify-content: space-around;
            margin-bottom: 10px;
        }

        .score-box {
            text-align: center;
            background: #fff0f5;
            padding: 5px 15px;
            border-radius: 10px;
            border: 2px solid #ffb6c1;
        }

        .score-label { color: #ff69b4; font-size: 10px; font-weight: bold; }
        .score-value { font-size: 18px; font-weight: bold; color: #ff1493; }

        /* 게임판 및 배경 캐릭터 설정 */
        #canvas-outer {
            position: relative;
            border: 4px solid #ffb6c1;
            border-radius: 5px;
            overflow: hidden;
            background-color: #fff;
        }

        /* 무학이 캐릭터 배경 - 명확하게 보이도록 설정 */
        #muhak-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; /* 캐릭터 크기 조절 */
            opacity: 0.3; /* 블록과 겹쳐도 보이도록 적절한 투명도 */
            z-index: 0;
            pointer-events: none;
        }

        #tetris {
            position: relative;
            z-index: 1;
            display: block;
        }

        /* 모바일용 컨트롤 버튼 */
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            max-width: 260px;
        }

        .btn {
            background: white;
            border: 2px solid #ffb6c1;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            color: #ff1493;
            touch-action: manipulation;
            text-align: center;
            user-select: none;
        }

        .btn:active { background: #ffb6c1; color: white; }
        .btn-rotate { grid-column: span 3; background: #fff0f5; }

    </style>
</head>
<body>

    <div id="game-title">마산무학여고 테트리스</div>

    <div id="game-wrapper">
        <div id="header">
            <div class="score-box">
                <div class="score-label">BEST</div>
                <div id="high-score" class="score-value">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">SCORE</div>
                <div id="score" class="score-value">0</div>
            </div>
        </div>

        <div id="canvas-outer">
            <img src="school_logo.png" id="muhak-bg" alt="무학이">
            <canvas id="tetris" width="240" height="400"></canvas>
        </div>

        <div id="controls">
            <div class="btn btn-rotate" onclick="playerRotate(1)">회전 (ROTATE)</div>
            <div class="btn" onclick="playerMove(-1)">◀</div>
            <div class="btn" onclick="playerDrop()">▼</div>
            <div class="btn" onclick="playerMove(1)">▶</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');

        context.scale(20, 20);

        // 캐릭터 컬러 팔레트 (분홍, 노랑, 초록 중심)
        const colors = [null, '#FF69B4', '#FFB6C1', '#FFD700', '#98FB98', '#FF8C00', '#BA55D3', '#40E0D0'];
        const pieces = 'ILJOTSZ';
        let nextQueue = [];

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'white';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        // --- 게임 로직 함수들 ---
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            scoreElement.innerText = player.score;
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function createMatrix(w, h) { return Array.from({length: h}, () => new Array(w).fill(0)); }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                if (player.score > player.highScore) {
                    player.highScore = player.score;
                    highScoreElement.innerText = player.highScore;
                }
                player.score = 0;
                scoreElement.innerText = 0;
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, highScore: 0 };

        // 키보드 이벤트
        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 32) playerRotate(1);
        });

        playerReset();
        update();
    </script>
</body>
</html>
