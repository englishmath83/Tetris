<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마산무학여고 테트리스</title>
    <style>
        body {
            background-color: #ffeff5; 
            color: #333;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* 상단부터 배치 */
            height: 100vh;
            margin: 0;
            padding-top: 20px;
        }

        /* 게임 제목 스타일 */
        #game-title {
            font-size: 24px;
            font-weight: 800;
            color: #ff1493;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.5);
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            border: 3px solid #ffb6c1;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #game-wrapper {
            background: #ffffff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #header {
            width: 100%;
            background: #fff0f5;
            border-radius: 10px;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            margin-bottom: 15px;
            border: 2px solid #ffb6c1;
        }

        .score-label { color: #ff69b4; font-size: 11px; margin-bottom: 2px; font-weight: bold; }
        .score-value { font-size: 20px; font-weight: bold; color: #ff1493; }

        #canvas-container {
            position: relative;
            line-height: 0;
        }
        
        #school-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            opacity: 0.25;
            z-index: 0;
            pointer-events: none;
        }

        #tetris {
            border: 5px solid #ffb6c1;
            background-color: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 15px rgba(255, 182, 193, 0.3);
            position: relative;
            z-index: 1;
            /* 모바일 화면 대응을 위해 최대 너비 제한 */
            max-width: 90vw;
            height: auto;
        }

        #next-container {
            margin-top: 15px;
            width: 100%;
            max-width: 240px;
            height: 70px;
            border: 3px solid #ffd700;
            background: #fffdf0;
            border-radius: 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .info { margin-top: 15px; font-size: 12px; color: #ff69b4; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="game-title">마산무학여고 테트리스 게임</div>

    <div id="game-wrapper">
        <div id="header">
            <div style="text-align: center;">
                <div class="score-label">BEST</div>
                <div id="high-score" class="score-value">0</div>
            </div>
            <div style="text-align: center;">
                <div class="score-label">SCORE</div>
                <div id="score" class="score-value">0</div>
            </div>
        </div>

        <div id="canvas-container">
            <img src="school_logo.png" id="school-bg" alt="Masan Muhak">
            <canvas id="tetris" width="240" height="400"></canvas>
        </div>

        <div id="next-container">
            <canvas id="next0" width="60" height="60"></canvas>
            <canvas id="next1" width="60" height="60"></canvas>
            <canvas id="next2" width="60" height="60"></canvas>
        </div>

        <div class="info">Space: 회전 | 화살표: 이동 및 낙하<br>(모바일은 키보드 연결 시 가능)</div>
    </div>

    <script>
        // 스크립트 부분은 로직이 동일하므로 위 답변의 코드를 그대로 사용하시되,
        // 색상값만 테마에 맞게 유지됩니다.
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');

        context.scale(20, 20);

        const colors = [null, '#FF69B4', '#FFB6C1', '#FFD700', '#98FB98', '#FF8C00', '#BA55D3', '#40E0D0'];
        const pieces = 'ILJOTSZ';
        let nextQueue = [];

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        function updateNextQueue() {
            while (nextQueue.length < 4) {
                nextQueue.push(pieces[pieces.length * Math.random() | 0]);
            }
            for (let i = 0; i < 3; i++) {
                drawPreview(nextQueue[i + 1], i);
            }
        }

        function drawPreview(type, index) {
            const previewCanvas = document.getElementById(`next${index}`);
            const ctx = previewCanvas.getContext('2d');
            const matrix = createPiece(type);
            ctx.clearRect(0, 0, 60, 60);
            ctx.fillStyle = colors[pieces.indexOf(type) + 1];
            const size = 12;
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) ctx.fillRect(x * size + 10, y * size + 10, size - 1, size - 1);
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function createMatrix(w, h) { return Array.from({length: h}, () => new Array(w).fill(0)); }

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'white';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerReset() {
            if (nextQueue.length === 0) updateNextQueue();
            const type = nextQueue.shift();
            player.matrix = createPiece(type);
            updateNextQueue();
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                if (player.score > player.highScore) {
                    player.highScore = player.score;
                    highScoreElement.innerText = player.highScore;
                }
                player.score = 0;
                scoreElement.innerText = 0;
            }
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            scoreElement.innerText = player.score;
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        const arena = createMatrix(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, highScore: 0 };

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) { player.pos.x--; if (collide(arena, player)) player.pos.x++; }
            else if (event.keyCode === 39) { player.pos.x++; if (collide(arena, player)) player.pos.x--; }
            else if (event.keyCode === 40) { playerDrop(); }
            else if (event.keyCode === 32) { playerRotate(1); }
        });

        playerReset();
        update();
    </script>
</body>
</html>
