<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마산무학여고 테트리스</title>
    <style>
        :root {
            --primary-pink: #ff1493;
            --soft-pink: #ffeff5;
            --border-pink: #ffb6c1;
        }

        body {
            background-color: var(--soft-pink);
            color: #333;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            touch-action: none; /* 모바일 드래그 방지 */
        }

        /* 게임 제목 */
        #game-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary-pink);
            margin: 10px 0;
            background: white;
            padding: 8px 25px;
            border-radius: 50px;
            border: 3px solid var(--border-pink);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        #game-wrapper {
            background: white;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 점수판 */
        #header {
            width: 100%;
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        .score-box {
            text-align: center;
            background: #fff8fa;
            padding: 5px 20px;
            border-radius: 12px;
            border: 2px solid var(--border-pink);
            min-width: 80px;
        }

        .score-label { color: #ff69b4; font-size: 11px; font-weight: bold; }
        .score-value { font-size: 20px; font-weight: bold; color: var(--primary-pink); }

        /* 게임판 박스 */
        #canvas-outer {
            position: relative;
            border: 5px solid var(--border-pink);
            border-radius: 12px;
            background-color: white;
            overflow: hidden;
            line-height: 0;
        }

        /* 무학이 캐릭터 배경 */
        #muhak-bg {
            position: absolute;
            top: 55%; /* 살짝 아래로 배치해서 안정감 부여 */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; /* 캐릭터를 크게 표시 */
            height: auto;
            opacity: 0.4; /* 캐릭터가 선명하면서도 게임에 지장 없는 수치 */
            z-index: 0;
            pointer-events: none;
        }

        #tetris {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.1); /* 배경 이미지 투과 */
        }

        /* 컨트롤 버튼 */
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            max-width: 280px;
        }

        .btn {
            background: white;
            border: 2px solid var(--border-pink);
            padding: 15px;
            border-radius: 15px;
            font-size: 22px;
            font-weight: bold;
            color: var(--primary-pink);
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0 var(--border-pink);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--border-pink);
            background: var(--soft-pink);
        }

        .btn-rotate {
            grid-column: span 3;
            font-size: 16px;
            background: #fffafa;
        }
    </style>
</head>
<body>

    <div id="game-title">마산무학여고 테트리스</div>

    <div id="game-wrapper">
        <div id="header">
            <div class="score-box">
                <div class="score-label">BEST</div>
                <div id="high-score" class="score-value">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">SCORE</div>
                <div id="score" class="score-value">0</div>
            </div>
        </div>

        <div id="canvas-outer">
            <img src="school_logo.png" id="muhak-bg" alt="무학이">
            <canvas id="tetris" width="240" height="400"></canvas>
        </div>

        <div id="controls">
            <div class="btn btn-rotate" onclick="handleRotate()">회전 (ROTATE)</div>
            <div class="btn" onclick="handleMove(-1)">◀</div>
            <div class="btn" onclick="handleDrop()">▼</div>
            <div class="btn" onclick="handleMove(1)">▶</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');

        context.scale(20, 20);

        // 무학이 리본, 옷, 장식 색상을 반영한 블록 컬러
        const colors = [
            null, 
            '#FF1493', // 딥핑크 (무학이 옷)
            '#FFB6C1', // 라이트핑크
            '#FFD700', // 골드 (리본/노랑)
            '#4CAF50', // 그린 (머리장식)
            '#FF8C00', // 오렌지
            '#9C27B0', // 퍼플
            '#00BCD4'  // 시안
        ];

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        // 블록 테두리
                        context.strokeStyle = 'rgba(255,255,255,0.8)';
                        context.lineWidth = 0.05;
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            scoreElement.innerText = player.score;
        }

        // --- 핸들러 함수들 ---
        function handleMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function handleDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function handleRotate() {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, 1);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -1);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                if (player.score > player.highScore) {
                    player.highScore = player.score;
                    highScoreElement.innerText = player.highScore;
                }
                player.score = 0;
                scoreElement.innerText = 0;
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) handleDrop();
            draw();
            requestAnimationFrame(update);
        }

        const arena = Array.from({length: 20}, () => new Array(12).fill(0));
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, highScore: 0 };

        // 키보드 지원
        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) handleMove(-1);
            else if (event.keyCode === 39) handleMove(1);
            else if (event.keyCode === 40) handleDrop();
            else if (event.keyCode === 32 || event.keyCode === 38) handleRotate();
        });

        playerReset();
        update();
    </script>
</body>
</html>
